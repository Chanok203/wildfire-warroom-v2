{% extends "base.html" %}

{% block title %}แผนที่{% endblock title %}

{% block style %}
<link rel="stylesheet" href="/public/vendor/maplibre-gl/css/maplibre-gl.css">
<style>
    #map {
        width: 100%;
        height: 100%;
        min-height: 600px;
        z-index: 1;
    }
</style>
{% endblock style %}

{% block content %}
<div class="container-fluid flex-grow-1 mt-3" style="height: calc(100vh - 150px);">
    <div class="row h-100 w-100 g-0">
        <div class="col-md-8 p-0 bg-dark d-flex align-items-center justify-content-center">

            <div class="position-relative w-100 h-100 bg-dark">
                <div id="map"></div>
            </div>

        </div>

        <div class="col-md-4 bg-light py-3 justify-content-center p-3">
            <h3 class="mb-4 text-center">ควบคุม</h3>
            <div class="row align-items-center mb-3">
                <div class="col">
                    <label>Patrol Route:</label>
                </div>
                <div class="col-sm-9">
                    <select id="patrol-select" class="selectpicker form-control" multiple data-actions-box="true"
                        data-selected-text-format="count > 3" data-container="body" title="Select ...">
                        <option value="patrol_walking" selected>เดินเท้า</option>
                        <option value="patrol_motorcycle">จักรยานยนต์</option>
                        <option value="patrol_car">รถยนต์</option>
                    </select>
                </div>
            </div>

            <form id="filter-form">
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="ref_time" class="col-form-label text-sm-end">เวลาที่ตรวจสอบ:</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="datetime-local" id="ref_time" class="form-control" value="" required>
                    </div>
                </div>
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="past_mins" class="col-form-label text-sm-end">ย้อนหลัง (นาที):</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="number" id="past_mins" class="form-control" min="0" step="1" value="" required>
                    </div>
                </div>
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="future_mins" class="col-form-label text-sm-end">พยากรณ์ล่วงหน้า (นาที):</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="number" id="future_mins" class="form-control" min="0" step="1" value="" required>
                    </div>
                </div>
                <button class="btn btn-primary w-100 mb-3" type="submit" id="submitBtn">ยืนยัน</button>
            </form>
            <hr>

            <h5 class="mb-4 text-center">เวลาที่ทำนาย</h5>
            <div class="row mb-3 align-items-center">
                <p>เวลาน้อยสุด: <span id="minTime"></span></p>
            </div>
            <div class="row mb-3 align-items-center">
                <p>เวลามากสุด: <span id="maxTime"></span></p>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block scripts %}
<script src="/public/vendor/axios/axios.min.js"></script>
<script src="/public/vendor/maplibre-gl/js/maplibre-gl.js"></script>
<script>
    const serverForecastId = "{{ forecastId }}";
    const serverQgisUrl = "{{qgisUrl}}";

    window.initForecastId = serverForecastId || "";
    window.initQgisUrl = serverQgisUrl || "";
</script>
<script src="/public/js/forecast/forecast-view.js"></script>
{% endblock scripts %}
